name: Publish to PyPI

# Trusted Publishing (OIDC) — no API token is stored. The PyPI project must have
# a Trusted Publisher configured for owner `qdzsh`, repo `agy-ui-mcp`, workflow
# `publish.yml`. Publishing 0.1.0 also reserves the name on PyPI.
on:
  release:
    types: [published]
  workflow_dispatch: {} # allow a manual re-run without cutting a new tag

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/agy-ui-mcp
    permissions:
      id-token: write # required for OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Check metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
